name: deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 3'
      timezone: 'Europe/Oslo'

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deployDev:
    name: deploy to dev
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app.yml
          VARS: .nais/dev.json
          IMAGE: ${{ needs.build.outputs.image }}

  deployProd:
    name: deploy to prod
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/app.yml
          VARS: .nais/prod.json
          IMAGE: ${{ needs.build.outputs.image }}
